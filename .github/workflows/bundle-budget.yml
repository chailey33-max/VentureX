name: Bundle Budget

on:
  pull_request:
    paths:
      - 'src/**'
      - 'vite.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/bundle-budget.yml'
  push:
    branches: ['main']
    paths:
      - 'src/**'
      - 'vite.config.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/bundle-budget.yml'

jobs:
  bundle-budget:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build with budget
        env:
          BUNDLE_BUDGET_JS_BYTES: '950000'
        run: pnpm run build:with-budget
